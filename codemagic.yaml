workflows:
  nexmusic_x:
    name: NexMusic X Build
    max_build_duration: 60

    environment:
      java: 17

    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper

    scripts:
      - name: Fix permissions
        script: chmod +x gradlew

      - name: Clean
        script: ./gradlew clean

      - name: Build Debug APK
        script: ./gradlew assembleDebug --stacktrace

    artifacts:
      - app/build/outputs/**/*.apk
